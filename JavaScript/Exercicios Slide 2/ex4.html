<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        alert("Descubra sua media do semestre!!")
        let firstNote = parseFloat(prompt("Digite sua nota do primeiro bimestre: "));
        let secondNote = parseFloat(prompt("Digite sua nota do segundo semestre: "));

        alert("Sua media é " + ((firstNote + secondNote) / 2) + "!!!");
    </script>
</body>

</html>
