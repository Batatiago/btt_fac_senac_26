<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let preco = parseFloat(prompt("Digite o valor da pizza"));
        let numeroCliente = parseInt(prompt("Digite quantas pessoas vao passar"));
        alert(`O valor que cada um deve pagar é R$${((preco *= 1.10) / numeroCliente).toFixed(2)}`)

    </script>
</body>

</html>
