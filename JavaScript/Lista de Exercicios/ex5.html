<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 5</title>
  </head>
  <body>
    <script>
      let idade = parseInt(prompt("Digite sua idade"));

      if (idade < 12) {
        alert("Criança");
      } else if (idade >= 12 && idade <= 17) {
        alert("Adolecente");
      } else if (idade >= 18) {
        alert("Adulto");
      }
    </script>
  </body>
</html>
