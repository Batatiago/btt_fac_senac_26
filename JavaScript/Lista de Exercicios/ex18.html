<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>18. Ordenação (sort):</h1>
    <p>Dado o array [5, 1, 9, 3, 7], ordene-o em ordem crescente usando sort.</p>
    <br><br>
    <p>Para adicionar os números digite e envie usando Enter</p>
    <p>Para mostrar na tela o array clique no botão "Mostrar"</p>
    <br><br>
    <input type="number" id="numerosInput" placeholder="   [5, 1, 9, 3, 7]">
    <button id="btn" onclick="capturarDados()">Mostrar</button>
    <div id="resultado"></div>
    <script>
        let numeros = [];
        let inputNumeros = document.getElementById("numerosInput");

        inputNumeros.addEventListener("keydown", function (input) {
            if (input.key === "Enter" && inputNumeros.value.trim() !== "") {
                numeros.push(inputNumeros.value);
                inputNumeros.value = "";
            }
        });

        function capturarDados() {
            let resultadoDiv = document.getElementById("resultado");
            let listaHTML = "<ul>let numeros = [";

            for (numero of numeros) {
                listaHTML += `<li>${numero}</li>`;
            }
            listaHTML += "];</ul><hr>";

            let numerosOrdenados = numeros.sort();

            listaHTML += "<ul>let numerosOrdenados = [";
            for (numero of numerosOrdenados) {

                listaHTML += `<li>${numero}</li>`;
            }
            listaHTML += "];</ul>";
            resultadoDiv.innerHTML = listaHTML;
        }
    </script>
</body>

</html>
