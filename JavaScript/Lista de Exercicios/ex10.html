<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercício 10</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>10. Contagem Regressiva com while:</h1>
  <p>Mostre no console a contagem regressiva de 10 até 1 com while.</p>
  <p id="txt"><br></p>
  <button id="btn">Contar</button>
  <script>
    let contador = 10;
    let txt = document.getElementById("txt")
    let btn = document.getElementById("btn")

    btn.addEventListener("click", function () {
      while (contador >= 1) {
        txt.innerHTML += `${contador} <br>`;
        contador--;
      }
    })
  </script>
</body>

</html>
