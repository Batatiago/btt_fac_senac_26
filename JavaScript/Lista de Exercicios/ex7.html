<body>
  <script>
    let nota = Number(prompt("Digite sua Nota:"));

    if (nota >= 7) {
      alert("Aprovado!!");
    } else if (nota >= 5 && nota < 7) {
      alert("Recuperação!!");
    } else if (nota < 5) {
      alert("Reprovado!!");
    }
  </script>
</body>
