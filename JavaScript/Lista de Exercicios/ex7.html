<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercício 7</title>
</head>

<body>
  <h1>Nota de Aluno:</h1>
  <p>Receba uma nota de 0 a 10.
    <br>
    o >= 7: "Aprovado".
    <br>
    o >= 5 e < 7: "Recuperação" .
    <br>
    o < 5: "Reprovado" . </p>
      <input type="number" id="nota" placeholder="Digite sua Nota">
      <button id="btn">Ok</button>
      <p id="txt"></p>
      <script>
        let notaInput = document.getElementById("nota");
        let btn = document.getElementById("btn")

        btn.addEventListener("click", function () {
          let nota = notaInput.value;

          if (nota >= 7) {
            document.getElementById("txt").append("Aprovado !!");
          } else if (nota >= 5 && nota < 7) {
            document.getElementById("txt").append("Recuperação !!");
          } else if (nota < 5) {
            document.getElementById("txt").append("Reprovado !!");
          }
        });
      </script>
</body>

</html>
