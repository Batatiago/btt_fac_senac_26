<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let numeros = [2, 5, 8, 11, 14];

        let maioresCinco = numeros.filter(maior => maior > 5);

        let maiores2X = maioresCinco.map(dobro => dobro * 2);

        console.log("Array: " + numeros);
        console.log("Maiores que cinco: " + maioresCinco);
        console.log("Dobro dos maiores: " + maiores2X);
    </script>
</body>

</html>
