<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercício 9</title>
</head>

<body>
  <h1>9. Tabuada com for:</h1>
  <p>Receba um número e mostre a tabuada de 1 a 10 usando for.</p>
  <input id="numeroInput" type="number" placeholder="Digite um Número">
  <button id="btn">Ok</button>
  <p id="txt"><br></p>
  <script>
    let numeroInput = document.getElementById("numeroInput");
    let btn = document.getElementById("btn")

    btn.addEventListener("click", function () {
      let numero = numeroInput.value;
      for (let multiplicador = 1; multiplicador < 11; multiplicador++) {
        document.getElementById("txt").innerHTML += `${numero} X ${multiplicador} = ${numero * multiplicador} <br>`;
      }
    });
  </script>
</body>

</html>
